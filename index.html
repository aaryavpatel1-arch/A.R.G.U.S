<!DOCTYPE html>
<html>
<head>
    <title>Cloud Workspace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; }
        .chat-container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .messages { height: 250px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 15px; background: #fafafa; border-radius: 4px; }
        .msg { margin-bottom: 8px; font-size: 14px; text-align: left; }
        .user { font-weight: bold; color: #2c3e50; }
        .btn { padding: 12px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 8px; font-size: 14px; }
        .connection-box { background: #eef2f7; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h3>☁️ Cloud Workspace Chat</h3>
        
        <div class="connection-box">
            <div><b>Your Room ID:</b> <span id="my-id" style="color:#e74c3c; font-family:monospace;">Generating...</span></div>
            <div style="margin-top: 8px; display: flex; gap: 5px;">
                <input type="text" id="target-id" placeholder="Type a Shared Room ID..." style="flex:1; padding:6px; border:1px solid #ddd; border-radius:4px;">
                <button id="connect-btn" style="background:#3498db; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-weight:bold;">🚪 Join Room</button>
            </div>
            <div style="margin-top: 5px; color:#7f8c8d; font-size:11px;">Status: <span id="peer-count" style="color: green; font-weight: bold;">Connected to Network</span></div>
        </div>

        <div class="messages" id="messages">
            <div class="msg"><span class="user">[System]:</span> Firewall-Proof Room active. Type a room ID above to join your friends!</div>
        </div>
        
        <form id="chat-form" onsubmit="sendMessage(event)">
            <input type="text" id="username" name="username" placeholder="Your name" style="width: 95%; padding: 8px; margin-bottom: 8px; border:1px solid #ddd; border-radius:4px;" required>
            <div style="display:flex; gap:8px;">
                <input type="text" id="message" name="message" placeholder="Type a message..." style="flex:1; padding:8px; border:1px solid #ddd; border-radius:4px;" required autocomplete="off">
                <button type="submit" class="btn" style="background:#4a90e2; width:auto; padding:8px 16px; margin:0;">Send</button>
            </div>
        </form>
    </div>

    <script>
        // PASTE YOUR ABLY KEY INSIDE THE QUOTES BELOW:
        const ABLY_KEY = '1lp6tg.HQf56Q:jG8WN7pKzXPd5tttAPzxYkI1oa3IBXDG_PVPWjknUmI';

        const box = document.getElementById('messages');
        let ably;
        let channel;

        // Generate a random room ID automatically just to give you an idea
        const randomRoomId = Math.random().toString(36).substr(2, 6).toUpperCase();
        document.getElementById('my-id').innerText = randomRoomId;

        try {
            // Connect to Ably's enterprise data stream network
            ably = new Ably.Realtime(ABLY_KEY);
            
            ably.connection.on('connected', () => {
                document.getElementById('peer-count').innerText = "Online";
            });
            
            ably.connection.on('failed', () => {
                logSystemMessage("Connection completely blocked by network firewalls.");
            });

            // Start by joining a default global room, or your own generated one
            joinChatRoom(randomRoomId);

        } catch(e) {
            alert("Network system error: " + e.message);
        }

        // Click handler to switch rooms
        document.getElementById('connect-btn').addEventListener('click', () => {
            const targetRoom = document.getElementById('target-id').value.trim().toUpperCase();
            if (!targetRoom) return;

            joinChatRoom(targetRoom);
            logSystemMessage(`Left old room. Joined Room: ${targetRoom}`);
            document.getElementById('my-id').innerText = targetRoom;
            document.getElementById('target-id').value = '';
        });

        function joinChatRoom(roomId) {
            // If we are already in a channel, detach from it first
            if (channel) {
                channel.unsubscribe();
            }

            // Open a specific room channel on the global network
            channel = ably.channels.get(roomId);

            // Listen for incoming messages from ANYONE in this room channel
            channel.subscribe('msg', (message) => {
                appendMessage(message.data.user, message.data.text);
            });
        }

        function sendMessage(e) {
            e.preventDefault();
            const userField = document.getElementById('username');
            const msgField = document.getElementById('message');
            
            const user = userField.value.trim();
            const text = msgField.value.trim();

            if (user && text && channel) {
                // Publish the message data straight to the room
                channel.publish('msg', { user: user, text: text });
                msgField.value = '';
            }
        }

        function appendMessage(user, text) {
            const cleanUser = user.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const cleanText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            box.innerHTML += `<div class="msg"><span class="user">[${cleanUser}]:</span> ${cleanText}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        function logSystemMessage(text) {
            box.innerHTML += `<div class="msg" style="color:gray; font-style:italic;"><span class="user">[System]:</span> ${text}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
