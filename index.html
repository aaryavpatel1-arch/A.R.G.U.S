<!DOCTYPE html>
<html>
<head>
    <title>A.R.G.U.S coms</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #000; 
            color: #e1e1e6; 
            margin: 0; 
            padding: 20px; 
            overflow-x: hidden;
        }

        /* Matrix Code Canvas Background */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .chat-container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: rgba(15, 15, 20, 0.85); 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 20px rgba(0, 255, 65, 0.15); 
            border: 1px solid #00ff41; 
            position: relative; 
            backdrop-filter: blur(8px); 
        }

        .messages { height: 250px; overflow-y: auto; border: 1px solid #00ff41; padding: 10px; margin-bottom: 15px; background: rgba(5, 5, 8, 0.9); border-radius: 4px; }
        .msg { margin-bottom: 8px; font-size: 14px; text-align: left; }
        .user { font-weight: bold; color: #00ff41; }
        .btn { padding: 12px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 8px; font-size: 14px; }
        .connection-box { background: rgba(20, 25, 20, 0.85); padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; border-left: 4px solid #00ff41; }
        
        /* Online roster styling */
        .roster-box { margin-top: 8px; font-size: 12px; border-top: 1px dashed #00ff41; padding-top: 8px; }
        .agent-tag { inline-size: max-content; display: inline-block; background: #050508; padding: 2px 8px; border-radius: 12px; margin: 2px; font-family: monospace; border: 1px solid #00ff41; }
        
        /* Silent Visual Pop-up Alert Notification Overlay */
        .join-popup {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #00ff41;
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 13px;
            box-shadow: 0 4px 15px rgba(0,255,65,0.4);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.4s ease, top 0.4s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        .join-popup.show { opacity: 1; top: 35px; }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>

    <div class="chat-container">
        <div id="join-alert" class="join-popup">Agent Joined the Uplink</div>

        <h3 style="color: #00ff41;">🔺 A.R.G.U.S coms</h3>
        
        <div class="connection-box">
            <div><b>Secure Uplink:</b> <span id="my-id" style="color:#00ff41; font-family:monospace; font-weight: bold;">MAIN_FREQUENCY</span></div>
            <div style="margin-top: 5px; color:#a8a8b3; font-size:11px;">Status: <span id="peer-count" style="color: #3498db; font-weight: bold;">Establishing Connection...</span></div>
            
            <div class="roster-box">
                <div><b>Active Agents:</b></div>
                <div id="agent-roster" style="margin-top: 4px;"><span style="color: gray; font-style: italic;">Awaiting network handshake...</span></div>
            </div>
        </div>

        <div class="messages" id="messages">
            <div class="msg"><span class="user">[System]:</span> A.R.G.U.S Terminal Active. Encrypted global channel established.</div>
        </div>
        
        <form id="chat-form" onsubmit="sendMessage(event)">
            <input type="text" id="username" name="username" placeholder="Agent Name" style="width: 95%; padding: 8px; margin-bottom: 8px; border:1px solid #00ff41; background: rgba(5, 5, 8, 0.9); color: white; border-radius:4px;" required>
            <div style="display:flex; gap:8px;">
                <input type="text" id="message" name="message" placeholder="Transmit message..." style="flex:1; padding:8px; border:1px solid #00ff41; background: rgba(5, 5, 8, 0.9); color: white; border-radius:4px;" required autocomplete="off">
                <button type="submit" class="btn" style="background:#00ff41; color: #000; width:auto; padding:8px 16px; margin:0;">Send</button>
            </div>
        </form>
    </div>

    <script>
        // --- MATRIX BACKGROUND ANIMATION ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const chars = '01ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&*<>[]{}';
        const fontSize = 14;
        const columns = Math.floor(window.innerWidth / fontSize);
        const drops = Array(columns).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00ff41';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = chars.charAt(Math.floor(Math.random() * chars.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        // --- CHAT LOGIC ---
        // PASTE YOUR ABLY KEY INSIDE THE QUOTES BELOW:
        const ABLY_KEY = '1lp6tg.HQf56Q:jG8WN7pKzXPd5tttAPzxYkI1oa3IBXDG_PVPWjknUmI';

        const PERMANENT_ROOM_ID = 'ARGUS_MAIN'; 

        const box = document.getElementById('messages');
        let ably;
        let channel;
        let currentAgentName = localStorage.getItem('argus_agent_name') || 'Agent_' + Math.floor(Math.random() * 1000);

        let lastProcessedMessageId = '';

        window.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('argus_agent_name');
            if (savedName) {
                document.getElementById('username').value = savedName;
            } else {
                document.getElementById('username').value = currentAgentName;
            }
        });

        try {
            ably = new Ably.Realtime({
                key: ABLY_KEY,
                clientId: currentAgentName,
                fallbackHosts: ['a.ably-realtime.com', 'b.ably-realtime.com', 'c.ably-realtime.com', 'd.ably-realtime.com', 'e.ably-realtime.com']
            });
            
            ably.connection.on('connected', () => {
                document.getElementById('peer-count').innerText = "ONLINE / SECURE";
                document.getElementById('peer-count').style.color = "#00ff41";
                joinChatRoom(PERMANENT_ROOM_ID);
            });
            
            ably.connection.on('failed', () => {
                logSystemMessage("Uplink failed. Network firewall block detected.");
                document.getElementById('peer-count').innerText = "BLOCKED";
                document.getElementById('peer-count').style.color = "#ff3333";
            });

        } catch(e) {
            alert("Terminal interface error: " + e.message);
        }

        function joinChatRoom(roomId) {
            channel = ably.channels.get(roomId);

            channel.subscribe('msg', (message) => {
                if (message.id === lastProcessedMessageId) {
                    return; 
                }
                lastProcessedMessageId = message.id;
                appendMessage(message.data.user, message.data.text);
            });

            channel.presence.enter();

            channel.presence.subscribe(['enter', 'leave', 'present', 'update'], () => {
                refreshRosterList();
            });

            channel.presence.subscribe('enter', (member) => {
                if (member.clientId === currentAgentName) return;
                triggerVisualPopup(member.clientId);
            });
        }

        function refreshRosterList() {
            channel.presence.get((err, members) => {
                if (err) return;
                
                const rosterDiv = document.getElementById('agent-roster');
                rosterDiv.innerHTML = '';
                
                if(members.length === 0) {
                    rosterDiv.innerHTML = '<span style="color: gray; font-style: italic;">No agents on frequency.</span>';
                    return;
                }

                members.forEach((member) => {
                    const cleanName = member.clientId.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    const isMe = member.clientId === currentAgentName ? " (You)" : "";
                    const dotColor = member.clientId === currentAgentName ? "#00ff41" : "#3498db";
                    
                    rosterDiv.innerHTML += `
                        <span class="agent-tag">
                            <span style="color: ${dotColor};">●</span> ${cleanName}${isMe}
                        </span>`;
                });
            });
        }

        function triggerVisualPopup(name) {
            const popup = document.getElementById('join-alert');
            const cleanName = name.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            
            popup.innerHTML = `🟢 Agent [${cleanName}] has joined the uplink`;
            popup.classList.add('show');
            
            setTimeout(() => {
                popup.classList.remove('show');
            }, 3000);
        }

        function sendMessage(e) {
            e.preventDefault();
            const userField = document.getElementById('username');
            const msgField = document.getElementById('message');
            
            const user = userField.value.trim();
            const text = msgField.value.trim();

            if (user && text && channel) {
                if (user !== currentAgentName) {
                    localStorage.setItem('argus_agent_name', user);
                    alert("Agent ID Updated. Reloading terminal interface to sync profile configuration.");
                    window.location.reload();
                    return;
                }
                
                channel.publish('msg', { user: user, text: text });
                msgField.value = '';
            }
        }

        function appendMessage(user, text) {
            const cleanUser = user.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const cleanText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            box.innerHTML += `<div class="msg"><span class="user">[${cleanUser}]:</span> ${cleanText}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        function logSystemMessage(text) {
            box.innerHTML += `<div class="msg" style="color:#a8a8b3; font-style:italic;"><span class="user">[System]:</span> ${text}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
