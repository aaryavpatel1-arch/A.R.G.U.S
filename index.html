<!DOCTYPE html>
<html>
<head>
    <title>Cloud Workspace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; margin: 0; padding: 20px; }
        .chat-container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .messages { height: 250px; overflow-y: auto; border: 1px solid #ddd; padding: 10px; margin-bottom: 15px; background: #fafafa; border-radius: 4px; }
        .msg { margin-bottom: 8px; font-size: 14px; text-align: left; }
        .user { font-weight: bold; color: #2c3e50; }
        .btn { padding: 12px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 8px; font-size: 14px; }
        .connection-box { background: #eef2f7; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h3>☁️ Cloud Workspace Chat</h3>
        
        <div class="connection-box">
            <div><b>Your Unique ID:</b> <span id="my-id" style="color:#e74c3c; font-family:monospace;">Connecting...</span></div>
            <div style="margin-top: 8px; display: flex; gap: 5px;">
                <input type="text" id="target-id" placeholder="Paste friend's ID here..." style="flex:1; padding:6px; border:1px solid #ddd; border-radius:4px;">
                <button id="connect-btn" style="background:#3498db; color:white; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; font-weight:bold;">➕ Add Friend</button>
            </div>
            <div style="margin-top: 5px; color:#7f8c8d; font-size:11px;">Connected friends: <span id="peer-count">0</span></div>
        </div>

        <div class="messages" id="messages">
            <div class="msg"><span class="user">[System]:</span> Cloud Alert Room active. Connect a friend to start.</div>
        </div>
        
        <form id="chat-form" onsubmit="sendMessage(event)">
            <input type="text" id="username" name="username" placeholder="Your name" style="width: 95%; padding: 8px; margin-bottom: 8px; border:1px solid #ddd; border-radius:4px;" required>
            <div style="display:flex; gap:8px;">
                <input type="text" id="message" name="message" placeholder="Type a message..." style="flex:1; padding:8px; border:1px solid #ddd; border-radius:4px;" required autocomplete="off">
                <button type="submit" class="btn" style="background:#4a90e2; width:auto; padding:8px 16px; margin:0;">Send</button>
            </div>
        </form>
    </div>

    <script>
        // Emergency visual tracker to catch hidden network errors on screen
        window.onerror = function(message, source, lineno, colno, error) {
            const box = document.getElementById('messages');
            if(box) {
                box.innerHTML += `<div style="color:red; font-weight:bold;">[Screen Error]: ${message} at line ${lineno}</div>`;
            }
            return false;
        };

        let peer;
        let connections = []; 
        const box = document.getElementById('messages');
        const seenMessageIds = new Set();

        try {
            // Initializing PeerJS with free Google STUN servers to punch through room/school firewalls
            peer = new Peer({
                config: {
                    'iceServers': [
                        { url: 'stun:stun.l.google.com:19302' },
                        { url: 'stun:stun1.l.google.com:19302' },
                        { url: 'stun:stun2.l.google.com:19302' }
                    ]
                }
            });

            peer.on('open', (id) => {
