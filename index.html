<!DOCTYPE html>
<html>
<head>
    <title>A.R.G.U.S coms</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121214; color: #e1e1e6; margin: 0; padding: 20px; }
        .chat-container { max-width: 500px; margin: 0 auto; background: #1a1a1e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid #29292e; }
        .messages { height: 250px; overflow-y: auto; border: 1px solid #29292e; padding: 10px; margin-bottom: 15px; background: #09090a; border-radius: 4px; }
        .msg { margin-bottom: 8px; font-size: 14px; text-align: left; }
        .user { font-weight: bold; color: #ff3333; }
        .btn { padding: 12px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 8px; font-size: 14px; }
        .connection-box { background: #202024; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; border-left: 4px solid #ff3333; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h3>🔺 A.R.G.U.S coms</h3>
        
        <div class="connection-box">
            <div><b>Secure Uplink:</b> <span id="my-id" style="color:#ff3333; font-family:monospace; font-weight: bold;">MAIN_FREQUENCY</span></div>
            <div style="margin-top: 5px; color:#a8a8b3; font-size:11px;">Status: <span id="peer-count" style="color: #3498db; font-weight: bold;">Establishing Connection...</span></div>
        </div>

        <div class="messages" id="messages">
            <div class="msg"><span class="user">[System]:</span> A.R.G.U.S Terminal Active. Encrypted global channel established.</div>
        </div>
        
        <form id="chat-form" onsubmit="sendMessage(event)">
            <input type="text" id="username" name="username" placeholder="Agent Name" style="width: 95%; padding: 8px; margin-bottom: 8px; border:1px solid #29292e; background: #09090a; color: white; border-radius:4px;" required>
            <div style="display:flex; gap:8px;">
                <input type="text" id="message" name="message" placeholder="Transmit message..." style="flex:1; padding:8px; border:1px solid #29292e; background: #09090a; color: white; border-radius:4px;" required autocomplete="off">
                <button type="submit" class="btn" style="background:#ff3333; width:auto; padding:8px 16px; margin:0;">Send</button>
            </div>
        </form>
    </div>

    <script>
        // PASTE YOUR ABLY KEY INSIDE THE QUOTES BELOW:
        const ABLY_KEY = '1lp6tg.HQf56Q:jG8WN7pKzXPd5tttAPzxYkI1oa3IBXDG_PVPWjknUmI';

        // Static permanent channel for everyone on the link
        const PERMANENT_ROOM_ID = 'ARGUS_MAIN'; 

        const box = document.getElementById('messages');
        let ably;
        let channel;

        try {
            ably = new Ably.Realtime(ABLY_KEY);
            
            ably.connection.on('connected', () => {
                document.getElementById('peer-count').innerText = "ONLINE / SECURE";
                document.getElementById('peer-count').style.color = "#2ecc71";
            });
            
            ably.connection.on('failed', () => {
                logSystemMessage("Uplink failed. Network firewall block detected.");
                document.getElementById('peer-count').innerText = "BLOCKED";
                document.getElementById('peer-count').style.color = "#ff3333";
            });

            joinChatRoom(PERMANENT_ROOM_ID);

        } catch(e) {
            alert("Terminal interface error: " + e.message);
        }

        function joinChatRoom(roomId) {
            channel = ably.channels.get(roomId);

            channel.subscribe('msg', (message) => {
                appendMessage(message.data.user, message.data.text);
            });
        }

        function sendMessage(e) {
            e.preventDefault();
            const userField = document.getElementById('username');
            const msgField = document.getElementById('message');
            
            const user = userField.value.trim();
            const text = msgField.value.trim();

            if (user && text && channel) {
                channel.publish('msg', { user: user, text: text });
                msgField.value = '';
            }
        }

        function appendMessage(user, text) {
            const cleanUser = user.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const cleanText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            box.innerHTML += `<div class="msg"><span class="user">[${cleanUser}]:</span> ${cleanText}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        function logSystemMessage(text) {
            box.innerHTML += `<div class="msg" style="color:#a8a8b3; font-style:italic;"><span class="user">[System]:</span> ${text}</div>`;
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
