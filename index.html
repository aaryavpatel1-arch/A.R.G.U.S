<!DOCTYPE html>
<html>
<head>
    <title>A.R.G.U.S coms</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121214; color: #e1e1e6; margin: 0; padding: 20px; }
        .chat-container { max-width: 500px; margin: 0 auto; background: #1a1a1e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid #29292e; position: relative; }
        .messages { height: 250px; overflow-y: auto; border: 1px solid #29292e; padding: 10px; margin-bottom: 15px; background: #09090a; border-radius: 4px; }
        .msg { margin-bottom: 8px; font-size: 14px; text-align: left; }
        .user { font-weight: bold; color: #ff3333; }
        .btn { padding: 12px; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 8px; font-size: 14px; }
        .connection-box { background: #202024; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; border-left: 4px solid #ff3333; }
        
        /* Online roster styling */
        .roster-box { margin-top: 8px; font-size: 12px; border-top: 1px dashed #29292e; padding-top: 8px; }
        .agent-tag { inline-size: max-content; display: inline-block; background: #09090a; padding: 2px 8px; border-radius: 12px; margin: 2px; font-family: monospace; border: 1px solid #29292e; }
        
        /* Silent Visual Pop-up Alert Notification Overlay */
        .join-popup {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 13px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.4s ease, top 0.4s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        .join-popup.show { opacity: 1; top: 35px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div id="join-alert" class="join-popup">Agent Joined the Uplink</div>

        <h3>🔺 A.R.G.U.S coms</h3>
        
        <div class="connection-box">
            <div><b>Secure Uplink:</b> <span id="my-id" style="color:#ff3333; font-family:monospace; font-weight: bold;">MAIN_FREQUENCY</span></div>
            <div style="margin-top: 5px; color:#a8a8b3; font-size:11px;">Status: <span id="peer-count" style="color: #3498db; font-weight: bold;">Establishing Connection...</span></div>
            
            <div class="roster-box">
                <div><b>Active Agents:</b></div>
                <div id="agent-roster" style="margin-top: 4px;"><span style="color: gray; font-style: italic;">Awaiting network handshake...</span></div>
            </div>
        </div>

        <div class="messages" id="messages">
            <div class="msg"><span class="user">[System]:</span> A.R.G.U.S Terminal Active. Encrypted global channel established.</div>
        </div>
        
        <form id="chat-form" onsubmit="sendMessage(event)">
            <input type="text" id="username" name="username" placeholder="Agent Name" style="width: 95%; padding: 8px; margin-bottom: 8px; border:1px solid #29292e; background: #09090a; color: white; border-radius:4px;" required>
            <div style="display:flex; gap:8px;">
                <input type="text" id="message" name="message" placeholder="Transmit message..." style="flex:1; padding:8px; border:1px solid #29292e; background: #09090a; color: white; border-radius:4px;" required autocomplete="off">
                <button type="submit" class="btn" style="background:#ff3333; width:auto; padding:8px 16px; margin:0;">Send</button>
            </div>
        </form>
    </div>

    <script>
        // PASTE YOUR ABLY KEY INSIDE THE QUOTES BELOW:
        const ABLY_KEY = '1lp6tg.HQf56Q:jG8WN7pKzXPd5tttAPzxYkI1oa3IBXDG_PVPWjknUmI';

        const PERMANENT_ROOM_ID = 'ARGUS_MAIN'; 

        const box = document.getElementById('messages');
        let ably;
        let channel;
        let currentAgentName = localStorage.getItem('argus_agent_name') || 'Agent_' + Math.floor(Math.random() * 1000);

        window.addEventListener('DOMContentLoaded', () => {
            const savedName = localStorage.getItem('argus_agent_name');
            if (savedName) {
                document.getElementById('username').value = savedName;
            } else {
                // If it's a first time user, populate the field with their temporary random agent name
                document.getElementById('username').value = currentAgentName;
            }
        });

        try {
            // Setup connection configuration mapping the clientId directly to our username
            ably = new Ably.Realtime({
                key: ABLY_KEY,
                clientId: currentAgentName
            });
            
            ably.connection.on('connected', () => {
                document.getElementById('peer-count').innerText = "ONLINE / SECURE";
                document.getElementById('peer-count').style.color = "#2ecc71";
                joinChatRoom(PERMANENT_ROOM_ID);
            });
            
            ably.connection.on('failed', () => {
                logSystemMessage("Uplink failed. Network firewall block detected.");
                document.getElementById('peer-count').innerText = "BLOCKED";
                document.getElementById('peer-count').style.color = "#ff3333";
            });

        } catch(e) {
            alert("Terminal interface error: " + e.message);
        }

        function joinChatRoom(roomId) {
            channel = ably.channels.get(roomId);

            // Chat message subscription logic
            channel.subscribe('msg', (message) => {
                appendMessage(message.data.user, message.data.text);
            });

            // Presence layer: register presence with our current name identity
            channel.presence.enter();

            // Presence listeners to catch when people join, leave, or update names
            channel.presence.subscribe(['enter', 'leave', 'present', 'update'], () => {
                refreshRosterList();
            });

            // Listen specifically for entry to flash the transient silent popup banner
            channel.presence.subscribe('enter', (member) => {
                if (member.clientId === currentAgentName) return;
                triggerVisualPopup(member.clientId);
            });
        }

        function refreshRosterList() {
            channel.presence.get((err, members) => {
                if (err) return;
                
                const rosterDiv = document.getElementById('agent-roster');
                rosterDiv.innerHTML = '';
                
                if(members.length === 0) {
                    rosterDiv.innerHTML = '<span style="color: gray; font-style: italic;">No agents on frequency.</span>';
                    return;
                }

                // Loop through all active users connected to the channel
                members.forEach((member) => {
                    const cleanName = member.clientId.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    const isMe = member.clientId === currentAgentName ? " (You)" : "";
                    const dotColor = member.clientId === currentAgentName ? "#2ecc71" : "#3498db";
                    
                    rosterDiv.innerHTML += `
                        <span class="agent-tag">
                            <span style="color: ${dotColor};">●</span> ${cleanName}${isMe}
                        </span>`;
                });
            });
        }

        function triggerVisualPopup(name) {
            const popup = document.getElementById('join-alert');
            const cleanName = name.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            
            popup.innerHTML = `🟢 Agent [${cleanName}] has joined the uplink`;
            popup.classList.add('show');
            
            setTimeout(() => {
                popup.classList.remove('show');
            }, 3000);
        }

        function sendMessage(e) {
            e.preventDefault();
            const userField = document.getElementById('username');
            const msgField = document.getElementById('message');
            
            const user = userField.value.trim();
            const text = msgField.value.trim();

            if (user && text && channel) {
                // If a user
